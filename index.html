<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>StrateKaz HyperFrames — Demo</title>
  <link rel="stylesheet" href="shared/styles/tokens.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--sk-color-bg);
      font-family: var(--sk-font-display);
      color: var(--sk-color-fg);
    }
    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 20%, var(--sk-color-primary-light) 0%, var(--sk-color-bg) 60%);
    }
    .stack {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    #brand {
      font-size: var(--sk-fz-xl);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1;
    }
    #x {
      font-size: var(--sk-fz-md);
      color: var(--sk-color-fg-muted);
      margin: 24px 0 0 0;
      font-weight: 300;
    }
    #framework {
      font-size: var(--sk-fz-lg);
      font-weight: 600;
      color: var(--sk-color-secondary);
      margin: 8px 0 0 0;
      line-height: 1;
    }
    #tagline {
      font-size: var(--sk-fz-sm);
      color: var(--sk-color-fg-muted);
      margin: 64px 0 0 0;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="stratekaz-demo"
       data-start="0"
       data-width="1920"
       data-height="1080">

    <div class="stack">
      <h1 id="brand"
          class="clip"
          data-start="0"
          data-duration="6"
          data-track-index="0">StrateKaz</h1>

      <p id="x"
         class="clip"
         data-start="1"
         data-duration="5"
         data-track-index="1">×</p>

      <h2 id="framework"
          class="clip"
          data-start="1.5"
          data-duration="4.5"
          data-track-index="2">HyperFrames</h2>

      <p id="tagline"
         class="clip"
         data-start="3"
         data-duration="3"
         data-track-index="3">Marketing · Compliance · Tutoriales · Reportes</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    tl.from("#brand", {
      opacity: 0,
      y: 60,
      duration: 1,
      ease: "power3.out"
    }, 0);

    tl.from("#x", {
      opacity: 0,
      scale: 0.5,
      duration: 0.6,
      ease: "back.out(2)"
    }, 1);

    tl.from("#framework", {
      opacity: 0,
      y: 40,
      duration: 0.9,
      ease: "power3.out"
    }, 1.5);

    tl.from("#tagline", {
      opacity: 0,
      y: 20,
      duration: 1,
      ease: "power2.out"
    }, 3);

    tl.to(".stack", {
      opacity: 0,
      duration: 0.6,
      ease: "power2.in"
    }, 5.4);

    window.__timelines = window.__timelines || {};
    window.__timelines["stratekaz-demo"] = tl;
  </script>
</body>
</html>
