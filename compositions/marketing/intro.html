<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>StrateKaz — Marketing Intro</title>
  <link rel="stylesheet" href="../../shared/styles/tokens.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--sk-color-bg);
      font-family: var(--sk-font-display);
      color: var(--sk-color-fg);
    }
    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(135deg, var(--sk-color-bg) 0%, var(--sk-color-bg-soft) 100%);
    }
    #grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--sk-color-primary) 1px, transparent 1px),
        linear-gradient(90deg, var(--sk-color-primary) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: 0.08;
    }
    #headline {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
      text-align: center;
      max-width: 1400px;
    }
    #headline span {
      color: var(--sk-color-secondary);
    }
    #sub {
      position: absolute;
      top: 56%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      color: var(--sk-color-fg-muted);
      margin: 0;
      text-align: center;
      max-width: 1200px;
    }
    .pill-row {
      position: absolute;
      top: 70%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 24px;
      justify-content: center;
    }
    .pill {
      padding: 18px 36px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 28px;
      font-weight: 500;
      color: var(--sk-color-fg);
    }
    #cta {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translate(-50%, 0);
      font-size: 32px;
      color: var(--sk-color-secondary);
      font-weight: 600;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="marketing-intro"
       data-start="0"
       data-width="1920"
       data-height="1080">

    <div id="grid" class="clip" data-start="0" data-duration="8" data-track-index="0"></div>

    <h1 id="headline"
        class="clip"
        data-start="0.3"
        data-duration="7.7"
        data-track-index="1">
      Gestión empresarial <span>360°</span><br/>para empresas colombianas
    </h1>

    <p id="sub"
       class="clip"
       data-start="1.2"
       data-duration="6.8"
       data-track-index="2">
      SG-SST · ISO 9001 · ISO 14001 · ISO 45001 · PESV · SIG integrado
    </p>

    <div class="pill-row">
      <div class="pill clip" data-start="2.2" data-duration="5.8" data-track-index="3">Cumplimiento</div>
      <div class="pill clip" data-start="2.4" data-duration="5.6" data-track-index="4">Consultoría 4.0</div>
      <div class="pill clip" data-start="2.6" data-duration="5.4" data-track-index="5">Automatización</div>
    </div>

    <p id="cta"
       class="clip"
       data-start="5"
       data-duration="3"
       data-track-index="6">stratekaz.com</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    tl.from("#grid", { opacity: 0, duration: 1, ease: "power2.out" }, 0);

    tl.from("#headline", {
      opacity: 0,
      y: 50,
      duration: 1.2,
      ease: "power3.out"
    }, 0.3);

    tl.from("#sub", {
      opacity: 0,
      y: 30,
      duration: 1,
      ease: "power2.out"
    }, 1.2);

    tl.from(".pill", {
      opacity: 0,
      y: 30,
      duration: 0.8,
      stagger: 0.2,
      ease: "back.out(1.4)"
    }, 2.2);

    tl.from("#cta", {
      opacity: 0,
      scale: 0.8,
      duration: 0.8,
      ease: "back.out(2)"
    }, 5);

    tl.to("#root", {
      opacity: 0,
      duration: 0.5,
      ease: "power2.in"
    }, 7.5);

    window.__timelines = window.__timelines || {};
    window.__timelines["marketing-intro"] = tl;
  </script>
</body>
</html>
